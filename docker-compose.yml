# ══════════════════════════════════════════════════════════════════════════
# Sentinel Fabric V2 — Local Development Docker Compose
# ══════════════════════════════════════════════════════════════════════════
# One-command dev setup:  docker compose up
#
# This file starts ALL dependencies (ClickHouse, Redis, Postgres, Kafka,
# Qdrant) plus Prometheus/Grafana for observability.  The backend and
# frontend are designed to be run OUTSIDE Docker for hot-reload:
#
#   Terminal 1:  cd backend && uvicorn app.main:app --reload
#   Terminal 2:  cd frontend && npm run dev
#
# If you prefer everything in Docker, uncomment the backend/frontend
# services at the bottom of this file.
# ══════════════════════════════════════════════════════════════════════════

services:
  # ── Data Tier ─────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: sentinel
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - IPC_LOCK
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  kafka:
    image: apache/kafka:3.7.0
    user: "0:0"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "MkU3OEVBNTcwNTEyNm"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Observability ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards

  # ── Application (uncomment for full Docker dev) ──────
  # backend:
  #   build:
  #     context: ./backend
  #     target: api
  #   ports:
  #     - "8000:8000"
  #   env_file: .env
  #   depends_on:
  #     clickhouse: { condition: service_healthy }
  #     redis:      { condition: service_healthy }
  #     postgres:   { condition: service_healthy }
  #     qdrant:     { condition: service_started }
  #     kafka:      { condition: service_started }
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://backend:8000
  #   depends_on:
  #     - backend

volumes:
  clickhouse_data:
  redis_data:
  postgres_data:
  kafka_data:
  qdrant_data:
  grafana_data:
