version: '3.8'

services:
  # ==========================================
  # Zookeeper (for Kafka and ClickHouse Cluster)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Faster session expiry so stale Kafka ephemeral nodes clear quickly
      ZOOKEEPER_SESSION_TIMEOUT: 6000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | bash -c 'cat > /dev/tcp/localhost/2181' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - sf_network

  # ==========================================
  # Kafka (High-Throughput Ingestion)
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Persist data so broker ID stays consistent across restarts
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Faster ZK session timeout to clear stale ephemeral nodes
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 6000
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - sf_network

  # ==========================================
  # ClickHouse Cluster (ReplicatedMergeTree)
  # ==========================================
  clickhouse-node1:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse-node1
    hostname: clickhouse-node1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data1:/var/lib/clickhouse
    networks:
      - sf_network
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped

  clickhouse-node2:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse-node2
    hostname: clickhouse-node2
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - clickhouse_data2:/var/lib/clickhouse
    networks:
      - sf_network
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================
  # Redis HA (Sentinel Topology representation)
  # ==========================================
  redis-master:
    image: redis:7.2-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - sf_network

  redis-replica:
    image: redis:7.2-alpine
    container_name: redis-replica
    command: redis-server --slaveof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sf_network

  redis-sentinel:
    image: bitnami/redis-sentinel:latest
    container_name: redis-sentinel
    environment:
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_SET=sf_master
      - REDIS_SENTINEL_QUORUM=1
    depends_on:
      redis-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sf_network

  # ==========================================
  # Qdrant Vector DB
  # ==========================================
  qdrant:
    image: qdrant/qdrant:v1.8.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sf_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # ==========================================
  # Postgres (SOAR & App Config)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: umbrix_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d umbrix_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - sf_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ==========================================
  # PgBouncer (Connection Pooling)
  # ==========================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_USER: sentinel
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 100
    ports:
      - "6432:5432"
    networks:
      - sf_network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ==========================================
  # Kafka Worker (Decoupled Pipeline Execution)
  # ==========================================
  worker:
    build: 
      context: ./backend
      target: worker
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse-node1:
        condition: service_started
      clickhouse-node2:
        condition: service_started
      redis-master:
        condition: service_healthy
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CLICKHOUSE_HOST=clickhouse-node1
      - REDIS_HOST=redis-master
      - REDIS_URL=redis://redis-master:6379/0
      - QDRANT_HOST=qdrant
      - POSTGRES_DSN=postgresql+asyncpg://sentinel:${POSTGRES_PASSWORD}@postgres:5432/umbrix_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    restart: unless-stopped
    networks:
      - sf_network

  # ==========================================
  # API Gateway & Frontend
  # ==========================================
  api:
    build: 
      context: ./backend
      target: api
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - CLICKHOUSE_HOST=clickhouse-node1
      - REDIS_HOST=redis-master
      - REDIS_URL=redis://redis-master:6379/0
      - QDRANT_HOST=qdrant
      - POSTGRES_DSN=postgresql+asyncpg://sentinel:${POSTGRES_PASSWORD}@postgres:5432/umbrix_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      # The API pushes to Kafka, does not run the pipeline directly
    networks:
      - sf_network
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_API_URL=http://api:8000
      - BACKEND_API_KEY=${JWT_SECRET_KEY}
    networks:
      - sf_network
    restart: unless-stopped

  # ==========================================
  # Edge Ingestion Gateways (Phase 16)
  # ==========================================
  gateway-eu-west:
    build:
      context: ./backend
      target: base
    command: uvicorn app.edge_gateway:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EDGE_REGION=eu-west
      - REDIS_URL=redis://redis-master:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - sf_network
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway-us-east:
    build:
      context: ./backend
      target: base
    command: uvicorn app.edge_gateway:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EDGE_REGION=us-east
      - REDIS_URL=redis://redis-master:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - sf_network
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==========================================
  # Monitoring (Prometheus & Grafana)
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - sf_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    networks:
      - sf_network
    restart: unless-stopped

networks:
  sf_network:
    driver: bridge

volumes:
  zk_data:
  zk_log:
  kafka_data:
  clickhouse_data1:
  clickhouse_data2:
  redis_data:
  qdrant_data:
  pg_data:
