title: Credential Dumping - LSASS Access
id: cred_001
description: Detects suspicious process access to lsass.exe, often indicative of credential dumping tools like Mimikatz or Procdump.
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x143a'
  filter:
    SourceImage|endswith:
      - '\svchost.exe'
      - '\csrss.exe'
      - '\smss.exe'
      - '\services.exe'
      - '\wininit.exe'
  condition: selection and not filter
tags:
  - attack.credential_access
  - attack.t1003.001
